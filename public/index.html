<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Todo Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Simple Todo App</h1>
        <p>A classic simple frontend connected to our backend service.</p>
        
        <form id="todo-form">
            <input type="text" id="todo-input" placeholder="What needs to be done?" required>
            <button type="submit">Add</button>
        </form>

        <ul id="todo-list">
            <!-- Todos will be injected here via JavaScript -->
        </ul>
    </div>

    <script src="app.js"></script>
</body>
</html>
